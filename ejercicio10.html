<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Semáforo</title>

    <style>
      .circle {
        border-radius: 50%;
        height: 5rem;
        width: 5rem;
        background-color: #444;
        margin: 10px;
        opacity: 0.2;
      }
    </style>
  </head>

  <body>
    <header>
      <div id="verde" class="circle"></div>
      <div id="amarillo" class="circle"></div>
      <div id="rojo" class="circle"></div>

      <button id="btn">Siguiente</button>
    </header>

    <script>
      const btn = document.getElementById("btn");

      const verde = document.getElementById("verde");
      const amarillo = document.getElementById("amarillo");
      const rojo = document.getElementById("rojo");

      const luces = [rojo, amarillo, verde];
      let estado = 0;

      function apagarTodo() {
        luces.forEach((luz) => {
          luz.style.opacity = "0.2";
        });
      }

      btn.addEventListener("click", function () {
        apagarTodo();

        if (estado === 0) {
          rojo.style.backgroundColor = "red";
          rojo.style.opacity = "1";
        }

        if (estado === 1) {
          amarillo.style.backgroundColor = "yellow";
          amarillo.style.opacity = "1";
        }

        if (estado === 2) {
          verde.style.backgroundColor = "green";
          verde.style.opacity = "1";
        }

        estado = (estado + 1) % 3;
      });
    </script>
  </body>
</html>
