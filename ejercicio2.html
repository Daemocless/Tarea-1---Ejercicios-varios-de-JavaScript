<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>

  <body>
    <header>
      <button id="btn">Clikc</button>
      <p id="resultado"></p>
    </header>
    <script>
      const buttonclick = document.getElementById("btn");
      const resultado = document.getElementById("resultado");

      buttonclick.addEventListener("click", function () {
        document.getElementById("resultado").innerText = "¡Hola Clase!";
      });
      const red = (document.getElementById("resultado").style.color = "red");
    </script>
  </body>
</html>
