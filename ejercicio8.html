<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>

  <body>
    <header>
      <button id="btn">Clikc</button>
      <img src="https://picsum.photos/200/300?random=1" alt="" id="foto" />
    </header>
    <script>
      let contador = 0;

      const buttonclick = document.getElementById("btn");

      buttonclick.addEventListener("click", function () {
        const img = document.getElementById("foto");
        contador = contador + 1;

        img.src = `https://picsum.photos/200/150?random=${contador}`;
      });
    </script>
  </body>
</html>
